[tool.ruff]
target-version = "py312"
line-length = 150

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# Tests use sys.path.insert before imports — intentional
"tests/**/*.py" = ["E402"]
# CLI entry points also use sys.path
"cli/**/*.py" = ["E402"]
# Orchestrator has long function calls with many keyword args
"generator/c_pipeline/orchestrator.py" = ["E501"]
# Long system prompts / log messages
"generator/c_pipeline/actions/http_request.py" = ["E501"]
"generator/long_novel/l4_review.py" = ["E501"]
# Legacy story card HTML templates and setup f-strings
"review_queue/human_review.py" = ["E501"]
"generator/long_novel/l0_book_setup.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
