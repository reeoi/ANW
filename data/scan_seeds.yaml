  - id: lao_tai_chong_sheng
    name: "老太重生(下沉市场爆款)"
    formula: "不孝子女推诿养老 → 老人冻死/饿死 → 重生回 40-50 岁 → 改掉掏心掏肺习惯 → 新生活"
    emotion_arc: "愤怒 → 解气 → 释然 → 满足"
    target_words: [9000, 13000]
    chapter_count: [8, 11]
    signature_scenes:
      - "母亲扇自私儿子巴掌"
      - "对付不作为的丈夫"
      - "拯救苦难的女儿"
      - "后期当妇女主任帮其他女性(格局升级)"
