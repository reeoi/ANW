# === 标题模式(LLM 按平台特性挑选) ===
title_patterns:
  点众式:
    template: "{人物}{行为},{反杀/后果/情绪}"
    examples:
      - "白眼狼妹妹把家产送人,我让她净身出户"
      - "愚人节死在棺材里后,三个哥哥都悔疯了"
      - "春节返程,老公一家把我女儿挂车外狗笼子里"
    适用题材: ["现代复仇打脸", "灵魂视角虐文", "家庭复仇", "假千金心声流"]
  七猫式:
    template: "{身份/状态}+{反转/觉醒}"
    examples:
      - "重生后我嫁给了郭家天阉"
      - "嫁给暴君十年,我决定带儿子改嫁"
      - "代嫁三年,他记错了我的名字"
    适用题材: ["年代重生", "古代宅斗", "总裁豪门"]
  知乎式:
    template: "{反常/悬疑悖论的一句话}"
    examples:
      - "我死后的第三天,老公发了一条朋友圈"
      - "你有没有在深夜接到过一个不该接的电话?"
      - "我是世上仅存的红衣厉鬼,我不知自己是怎么死的"
    适用题材: ["现代悬疑超自然", "细节线索复仇", "灵魂视角虐文"]
  黑岩式:
    template: "{极端冲击}/{道德踩踏}的状态描述"
    examples:
      - "三个月后我代替皇后嫡亲公主坐上去漠北和亲的轿撵"
      - "我的尸体躺在透明棺材里,三个哥哥在外面笑着说她演得真像"
    适用题材: ["虐恋复仇", "假千金心声流", "灵魂视角虐文"]
  番茄主流:
    description: "番茄短篇标题混合点众与七猫风格,偏好动词驱动+结果暗示"
    template: "{触发事件},{我的反击/觉醒}"
    examples:
      - "丈夫给情人买学区房,我连夜做了三件事"
      - "我把孩子从奶奶家接回来那天,全家炸了"
      - "重生后我把家产送给了那个被全家羞辱的'傻女儿'"

# === 简介公式(Phase 1 输出 summary 时按平台对应公式) ===
summary_formulas:
  番茄_主推:
    structure: "情境设定(1-2句) → 冲突引爆(2-3句) → 对话金句(1-2句) → 主角转折(1句) → 悬念钩子(1句)"
    word_range: [150, 300]
    must_include: ["第一人称", "至少 1 句对话", "结尾留钩"]
  七猫总裁:
    structure: "正常生活 → 伤害事件 → 最残忍对话 → 女主反转 → 悬念钩子"
    word_range: [133, 322]
    must_include: ["对话占 70%+", "对话选最伤人那句"]
  黑岩女频:
    structure: "递进式控诉/心声揭穿/绝症倒计时/重生对比/公开羞辱+底牌"
    word_range: [103, 363]
    must_include: ["核心是'这一次我...'"]
  知乎金句式:
    structure: "人物关系 → 核心冲突 → 2-3 转折 → 金句/留白"
    word_range: [200, 500]
    must_include: ["简介即微小说", "金句收尾"]
  点众_浓缩:
    structure: "场景设定 → 信任陷阱 → 致命真相 → 反击暗示"
    word_range: [150, 300]
    must_include: ["简介浓缩前 1/3 精华"]

# === 开头模式(LLM 演化时挑选) ===
opening_modes:
  - id: chong_tu_qian_zhi
    name: "冲突前置"
    template: "第一句就是矛盾"
    example: "离婚协议放在桌上,他已经签了。"
  - id: xin_xi_cha_gou
    name: "信息差钩"
    template: "给读者一个角色不知道的信息"
    example: "她不知道,对面那个男人已经在计划第三次了。"
  - id: fan_chang_xing_wei
    name: "反常行为"
    template: "用一个不合常理的行为引起好奇"
    example: "她把订婚戒指冲进了马桶。"
  - id: chong_sheng_fan_chang
    name: "重生反常"
    template: "重生后做前世绝不会做的事"
    example: "沈栀心念成灰,支着一口气找到媒婆:郭家的那个天阉,我来嫁。"
  - id: ling_hun_pang_guan
    name: "灵魂旁观"
    template: "以灵魂视角描述死亡现场"
    example: "我的尸体躺在透明棺材里,三个哥哥在外面笑着说:她演得真像。"
  - id: bing_zhong_bei_bi
    name: "病中被逼"
    template: "第一句就是身体最脆弱时被逼做最累的事"
    example: "我刚做完脊椎手术,医生再三嘱咐要静养三个月。妈妈却攥着我的手腕:快点,祭祀要开始了。"
  - id: si_wang_hui_su
    name: "死亡回溯"
    template: "第一句就交代死法和凶手"
    example: "孕八月时发现老公出轨,我情绪崩溃导致早产。手术台上大出血。"
  - id: xuan_nian_ju
    name: "悬念句"
    template: "抛出一个需要解释的事实"
    example: "我死后的第三天,老公发了一条朋友圈。"
  - id: dai_ru_shi_ti_wen
    name: "代入式提问"
    template: "直接让读者产生共鸣"
    example: "你有没有在深夜接到过一个不该接的电话?"
  - id: ti_jia_bei_qi
    name: "替嫁被弃"
    template: "被迫接受不公正的命运"
    example: "三个月后,我代替皇后的嫡亲公主坐上了去漠北和亲的轿撵。"
  - id: leng_xiao_fa_xian
    name: "冷发现"
    template: "发现异常后第一反应不是哭闹而是冷笑"
    example: "我笑着点头。当天就去月子中心记下预约单,转身给公司法务部写了封举报信。"
  - id: yi_chang_wu_jian
    name: "异常物件"
    template: "一个不该出现在这里的物件引发全局"
    example: "避孕套日期突然变了,连味道也变成了我以前过敏的芒果味。"

# === 结尾模式 ===
ending_modes:
  - id: yu_yun_shi
    name: "余韵式"
    适用情绪: ["意难平", "共鸣感动"]
    技法: "不说完,让读者自己想"
  - id: hu_ying_shi
    name: "呼应式"
    适用情绪: ["治愈温暖"]
    技法: "首尾呼应形成闭环"
  - id: kai_fang_shi
    name: "开放式"
    适用情绪: ["细思极恐"]
    技法: "留下悬念"
  - id: fan_zhuan_zai_fan_zhuan
    name: "反转再反转"
    适用情绪: ["反转震撼"]
    技法: "结尾再来一个小反转"
  - id: jin_ju_shi
    name: "金句式"
    适用情绪: ["共鸣感动", "意难平"]
    技法: "一句话点题"
  - id: chong_sheng_nuan_xin
    name: "重生暖心式"
    适用情绪: ["治愈温暖"]
    技法: "投胎到温暖家庭用温馨细节呼应前世缺失;'这一世护腰很暖,妈妈也很好'"
  - id: yu_yun_dao_ju
    name: "余韵道具式"
    适用情绪: ["意难平"]
    技法: "用一个物件暗示未来不说破"
  - id: da_chang_jing_tou
    name: "大长镜头式"
    适用情绪: ["爽感释放"]
    技法: "电影感收场仪式感极强;'厚重的隔音门彻底关上将两个世界永远地隔绝'"
  - id: fan_feng_dui_wei
    name: "反讽对位式"
    适用情绪: ["意难平", "爽感释放"]
    技法: "用反派的视角写出最讽刺的结局;漠视比报复更有力"

# === 反转类型 ===
reversal_types:
  - id: shen_fen_fan_zhuan
    name: "身份反转"
    pattern: "看似普通人 → 实则隐藏大佬/真千金"
    examples: ["古代宅斗", "都市系统逆袭", "反套路嫁祸型重生"]
  - id: shi_jiao_fan_zhuan
    name: "视角反转"
    pattern: "读者跟随主角视角 → 揭示反派也有内心戏 → 重新理解全局"
    examples: ["年代重生双重复仇", "宫闱腹黑型"]
  - id: dong_ji_fan_zhuan
    name: "动机反转"
    pattern: "看似 A 动机 → 实则 B 动机"
    examples: ["宫闱隐忍腹黑(主角全程操纵)"]
  - id: shi_jian_xian_fan_zhuan
    name: "时间线反转"
    pattern: "重生/穿越/灵魂回溯,时间线被颠覆"
    examples: ["年代重生", "重生离婚逆袭", "假千金心声流"]
  - id: xin_xi_cha_fan_zhuan
    name: "信息差反转"
    pattern: "读者一直被误导 → 真相揭示推翻所有"
    examples: ["现代悬疑超自然", "细节线索复仇"]

# === 多样性约束(LLM 演化 100 题材时必须满足) ===
diversity_constraints:
  emotion_distribution_target:
    yi_nan_ping: 0.18
    fan_zhuan_zhen_han: 0.15
    shuang_gan_shi_fang: 0.30   # 主力
    zhi_yu_wen_nuan: 0.10
    xi_si_ji_kong: 0.07
    gong_ming_gan_dong: 0.20
  genre_max_share: 0.15           # 单 genre 不超 15 题材(15%)
  platform_distribution_target:
    番茄短篇: 0.50
    七猫短篇: 0.15
    黑岩短篇: 0.10
    点众短篇: 0.15
    知乎盐言: 0.10
  reversal_type_min_distinct: 4   # 100 题材中至少使用 4 种不同反转类型
  opening_mode_min_distinct: 8    # 至少使用 8 种不同开头模式
  ending_mode_min_distinct: 6     # 至少使用 6 种不同结尾模式
  duplicate_prevention:
    no_two_themes_share_more_than_n_keywords: 3
    avoid_recent_pool_themes: true   # 演化时去掉与上周 pool 的重复

# === 时间种子修饰(每周变化注入,防止演化结果一成不变) ===
time_seed_modifiers:
  description: "scan 任务每次取这些类目随机抽几个,作为'本周流行风向'注入 LLM 演化 prompt,产生周间差异"
  current_topics_pool:    # 持续维护,可手动追加
    - "高考志愿"
    - "彩礼纠纷"
    - "拆迁分房"
    - "学区房"
    - "婚前协议"
    - "家族企业接班"
    - "中年危机"
    - "失业再就业"
    - "婆媳大战"
    - "二胎/三胎压力"
    - "AI 替代人类岗位"
    - "原生家庭议题"
    - "奶奶带娃"
    - "丁克家庭"
    - "海归回国"
    - "互联网创业泡沫"
    - "明星塌房"
    - "电信诈骗"
    - "代孕风波"
    - "亲子鉴定"
  seasonal_topics:
    spring: ["相亲", "返乡", "扫墓"]
    summer: ["毕业", "高考放榜", "暑假补课"]
    autumn: ["开学", "中秋团圆", "国庆相亲"]
    winter: ["年终奖", "春节回家", "婚介所"]
  weekly_random_count: 5    # 每周从上述池随机抽 5 个作为本周风向

# === 输出 Schema(LLM 演化时严格按此 JSON 结构输出) ===
output_schema:
  description: "每条 theme_pool item 必须包含以下字段"
  fields:
    id: "tp_{YYYY}w{周数}_{序号:03d},如 tp_2026w19_001"
    theme: "10-30 字的题材一句话描述,可直接作为 Phase 1 的输入"
    emotion: "emotion_types.id 之一"
    genre: "genres.id 之一"
    formula_used: "genres[genre].formula 的引用"
    target_platform: "target_platform.primary 或 comparator_platforms 的 key"
    target_length: "[min, max],来自 target_platform/comparator 的 word_count_range"
    hint_title: "符合 title_patterns 中某个 template 的具体标题"
    title_pattern_used: "title_patterns 的 key"
    opening_mode: "opening_modes.id 之一"
    ending_mode: "ending_modes.id 之一"
    reversal_type: "reversal_types.id 之一"
    expected_audience: "如 '女频/25-35 都市'"
    seasonal_or_topic_seed: "本次注入的本周风向词(如 '彩礼纠纷')"
    consumed_count: 0   # 初始 0,每被 Phase 0 消费一次 +1
    created_at: "ISO 时间戳"

# === LLM 演化指令模板(scan/seed_evolver.py 拼装时使用) ===
llm_evolution_prompt_template: |
  你是中文短篇网文市场分析师 + 题材策划。

  【任务】基于下方种子库,演化产出 ${pool_size} 个差异化、可写性强的具体题材,严格按 output_schema 输出 JSON 数组。

  【主目标平台】${primary_platform}(${primary_word_range} 字,${audience})
  【对标平台】${comparator_summary}

  【可选情绪类型】${emotion_options}
  【可选题材公式库】${genre_options}
  【可选标题模式】${title_pattern_options}
  【可选开头模式】${opening_mode_options}
  【可选结尾模式】${ending_mode_options}
  【可选反转类型】${reversal_type_options}

  【本周风向词(必须每条至少融入 1 个)】${weekly_topics}
  【已生成池(避免雷同)】${existing_pool_themes_short_list}

  【硬性约束】
  - 严格按 ${diversity_constraints_summary} 分布
  - theme 字段 10-30 字,具体到角色身份+触发事件+情绪走向
  - 同一情绪×同一题材组合不超过 ${genre_max_count_per_emotion} 个
  - 至少 ${reversal_type_min_distinct} 种不同反转类型
  - 至少 ${opening_mode_min_distinct} 种不同开头模式
  - 任意两条 theme 关键词重叠不超过 3 个

  【输出格式】
  仅输出 JSON 数组,不要 Markdown 代码块,不要解释。每个对象包含 output_schema.fields 列出的所有字段。

  现在开始演化 ${pool_size} 个题材:
