# ANW scan_seeds.yaml
# 每周一 03:00 weekly_scan 任务用此文件作为输入,产 100 条 theme_pool 进 data/theme_pool.json。
# 蒸馏自 oh-story-claudecode 的 real-market-data.md + genre-writing-formulas.md。
# 修改后下一次 scan 自动生效。

version: 1
distilled_at: "2026-05-06"
source_repo: "oh-story-claudecode-main"
source_files:
  - "skills/story-short-scan/references/real-market-data.md"
  - "skills/story-short-write/references/genre-writing-formulas.md"

# === 目标平台 ===
# ANW 当前只发番茄短篇,其他平台作为风格对标参考。
target_platform:
  primary: "番茄短篇"
  primary_traits:
    word_count_range: [8000, 15000]   # 主力 8000-12000
    chapter_count_range: [7, 12]
    person: "第一人称为主(95%+)"
    audience: "下沉市场为主,女频占比 70%+,年龄 20-45"
    flagship_genres: ["现代复仇打脸", "总裁豪门", "灵魂视角虐文", "重生反杀", "现实生活", "悬疑反转"]
    paragraph_rule: "1-3 句一段,每段不超 60 字"
    dialogue_ratio: [0.20, 0.40]
    opening_window_chars: 100   # 前 100 字必须出现冲突或信息炸弹
    ending_styles: ["HE 为主(50%+)", "BE 余韵", "开放式暗示"]
  comparator_platforms:
    七猫短篇:
      word_count: [10000, 20000]
      core: "重生幻想/态度反转/心声流"
      ratio_in_pool: 0.15
    黑岩短篇:
      word_count: [8000, 40000]
      core: "极致刺激/灵魂视角/虐恋极致"
      ratio_in_pool: 0.10
    点众短篇:
      word_count: [8000, 15000]
      core: "情绪快餐/弹幕流/读心/系统流/标题即剧情"
      ratio_in_pool: 0.15
    知乎盐言:
      word_count: [5000, 15000]
      core: "情感精品/专业细节/社会议题/金句"
      ratio_in_pool: 0.10
  # ratio_in_pool 是种子配比指引: 主平台 50% + 4 个 comparator 各 ~12.5%

# === 情绪类型(closed enum,LLM 必须从中选一个作为 primary_emotion) ===
emotion_types:
  - id: yi_nan_ping
    name: "意难平"
    suitable_for: ["虐恋", "遗憾", "错过", "BE 收尾"]
    market_heat: 3        # 1-3 分
    difficulty: 2         # 1-3 分
    target_arc: "稳态 → 撕裂 → 余韵"
  - id: fan_zhuan_zhen_han
    name: "反转震撼"
    suitable_for: ["悬疑", "身份错位", "信息差揭露"]
    market_heat: 3
    difficulty: 3
    target_arc: "误导 → 揭示 → 重新理解"
  - id: shuang_gan_shi_fang
    name: "爽感释放"
    suitable_for: ["打脸", "逆袭", "复仇", "重生反杀"]
    market_heat: 2
    difficulty: 1
    target_arc: "压抑 → 反击 → 碾压"
  - id: zhi_yu_wen_nuan
    name: "治愈温暖"
    suitable_for: ["成长", "亲情", "友情", "新生活"]
    market_heat: 2
    difficulty: 2
    target_arc: "缺失 → 联结 → 圆满"
  - id: xi_si_ji_kong
    name: "细思极恐"
    suitable_for: ["悬疑", "心理", "灵异", "开放式"]
    market_heat: 1
    difficulty: 3
    target_arc: "正常 → 异常 → 颠覆"
  - id: gong_ming_gan_dong
    name: "共鸣感动"
    suitable_for: ["现实", "职场", "婚姻", "家庭"]
    market_heat: 3
    difficulty: 2
    target_arc: "代入 → 撕裂 → 释然"

# === 题材库(从 21 个公式蒸馏,LLM 选一个 genre 配 emotion) ===
# 每个 genre 的 hot_score: 番茄短篇环境下的市场热度估算(1-3 分)
genres:
  - id: xian_dai_fu_chou
    name: "现代复仇打脸"
    formula: "当众背叛 → 冷静反击 → 证据递交 → 反派自毁 → 最终加冕"
    emotion_arc: "愤怒 → 爽 → 紧张 → 极爽 → 余韵"
    target_words: [8000, 11000]
    chapter_count: [6, 10]
    signature_scenes:
      - "当众羞辱开场:第一段就是主角被亲近之人当众背叛"
      - "冷静标志性动作:端起水杯/理西装/转车钥匙"
      - "逐层揭露证据:每章一个,层层加码"
      - "反派自曝最丑陋的话:常被监控/直播拍下"
    target_platforms: ["番茄短篇", "黑岩短篇", "点众短篇"]
    hot_score: 3
    notes: "主角永远不失态,用动作替代情绪;对方越歇斯底里,主角越平静"

  - id: gu_dai_zhai_dou
    name: "古代宅斗身份反转"
    formula: "被弃回归 → 后院交锋 → 信物初露 → 被陷害软禁 → 圣旨身份揭露 → 反扑 → 最终碾压"
    emotion_arc: "压抑 → 压抑 → 释放 → 短暂再压 → 终极释放"
    target_words: [10000, 14000]
    chapter_count: [7, 10]
    signature_scenes:
      - "回归时父母第一句不是想念而是嫌弃"
      - "被冤枉被打,积攒仇恨值"
      - "信物展示让关键人物变色"
      - "身份揭露名场面:全场跪下"
    target_platforms: ["七猫短篇", "番茄短篇"]
    hot_score: 2
    notes: "压抑 3 节释放 1 节;父母用'偏心'写,不用'坏'写"

  - id: nve_lian_fu_chou_linghun
    name: "虐恋复仇灵魂视角"
    formula: "死亡回溯 → 虐待现场 → 小三虚伪 → 开棺真相 → 舆论反转 → 崩溃 → 收尾"
    emotion_arc: "窒息 → 暴怒 → 冰冷 → 心碎 → 爽 → 苍凉"
    target_words: [9000, 12000]
    chapter_count: [7, 10]
    signature_scenes:
      - "保小不保大:渣男最冷酷的那句话"
      - "对比场景:同时家人被打 vs 渣男给小三买东西"
      - "孩子出场:3 岁小孩一句话击穿防线"
      - "定时发布证据:主角死后布局"
      - "开棺/亲眼看到自己遗体"
    target_platforms: ["黑岩短篇", "点众短篇", "番茄短篇"]
    hot_score: 3
    notes: "灵魂飘在半空视角;时间线穿插现在与回忆;渣男合理化自己的恶"

  - id: zong_cai_hao_men
    name: "总裁豪门白月光虐恋"
    formula: "三层伤害(言语→行为→身体) → 临界事件心死 → 真相揭露 → 渣男追悔被拒 → 新生活"
    emotion_arc: "虐(30%) → 觉醒(15%) → 爽(35%) → 治愈(20%)"
    target_words: [10000, 13000]
    chapter_count: [8, 11]
    signature_scenes:
      - "开篇背叛信息炸弹:'三年前我在产房生下痴傻儿子'"
      - "白月光出场每句话都是羞辱"
      - "临界事件:看监控/母亲去世他还带秘书旅行"
      - "死遁/消失(30% 作品使用)"
      - "渣男追悔被拒:'那你怎么不去死呢?'"
      - "新恋情暗示(50% 作品收尾)"
    target_platforms: ["七猫短篇", "番茄短篇", "点众短篇"]
    hot_score: 3
    notes: "100% 第一人称;爽按序释放(小→中→大→温暖);高频意象:白月光/怀孕流产/监控"

  - id: nian_dai_chong_sheng
    name: "年代重生双重复仇"
    formula: "前世被利用 → 双重生设定 → 选不同路 → 男主温柔登场 → 渣男自以为赢 → 揭发 → BE 收尾"
    emotion_arc: "愤怒 → 解气 → 甜 → 紧张 → 极爽 → 余韵痛快"
    target_words: [12000, 16000]
    chapter_count: [9, 12]
    signature_scenes:
      - "前世替罪羊设定(替坐牢/被谣言)"
      - "年代细节:的确良/大团结/赤脚医生/牛棚"
      - "男主'缺陷'实则完美(天阉是假温柔是真)"
      - "渣男最后崩溃发现自己输得最惨"
      - "结尾用渣男视角写后悔"
    target_platforms: ["七猫短篇", "番茄短篇"]
    hot_score: 2
    notes: "双重生=双重信息战;'替罪羊'比'被出轨'更有冲击力"

  - id: gong_wei_nve_fu
    name: "宫闱宅斗女帝逆袭"
    formula: "家族被害 → 替嫁 → 暗中布局 → 带走资源离开 → 积蓄力量 → 反攻 → 称帝改革"
    emotion_arc: "悲愤 → 隐忍 → 悬念 → 爽 → 极爽 → 满足"
    target_words: [12000, 18000]
    chapter_count: [10, 15]
    signature_scenes:
      - "开篇家族被害:父兄战死母亲呕血"
      - "替嫁场景展现智慧:借机布局非盲目接受"
      - "带走家产:表面顺从实则掏空"
      - "反攻名场面:血洗皇城"
      - "称帝改革体现格局"
    target_platforms: ["七猫短篇", "番茄短篇"]
    hot_score: 2
    notes: "主角从不解释计划,让读者自己猜;反派是利益驱动的冷漠不是纯坏"

  - id: xian_dai_xuan_yi
    name: "现代悬疑超自然视角"
    formula: "鬼伪装人 → 被骗入局 → 怨气升级 → 顺水推舟 → 揭露犯罪网 → 最终对决 → 双重惩罚"
    emotion_arc: "好奇 → 紧张 → 爽 → 更爽 → 震撼 → 痛快"
    target_words: [10000, 14000]
    chapter_count: [8, 12]
    signature_scenes:
      - "设定一句话说清:'我是红衣厉鬼伪装成人生活'"
      - "被骗后'不慌反喜':需要怨气升级"
      - "鬼能看到死者记忆"
      - "反派震惊台词:'她没有器官!'"
      - "法律审判+鬼的永恒折磨"
    target_platforms: ["番茄短篇", "知乎盐言"]
    hot_score: 2
    notes: "鬼视角是独特卖点;每章结尾要有反转或新发现"

  - id: jia_kong_xing_bie_fan_zhuan
    name: "架空历史性别反转"
    formula: "被家暴/被误解 → 配偶偏心外人 → 决定离开 → 离开后变好 → 配偶后悔 → 不原谅 BE"
    emotion_arc: "憋屈 → 更憋屈 → 释然 → 轻松 → 暗爽 → 意难平"
    target_words: [10000, 13000]
    chapter_count: [8, 11]
    signature_scenes:
      - "开篇被冤枉/被打"
      - "白莲花情敌让读者恨得牙痒"
      - "主角离开干净利落"
      - "配偶后悔递进:无所谓→想念→疯狂"
      - "结局 BE,'来不及了'比'不可能'更虐"
    target_platforms: ["番茄短篇", "黑岩短篇"]
    hot_score: 2
    notes: "性别反转是外壳,核心是'不被珍惜的人选择离开';男主视角 = 女频读者投射"

  - id: jia_qian_jin_xin_sheng
    name: "假千金心声流(灵魂旁观)"
    formula: "极致虐待开场 → 灵魂旁观 → 家人冷漠 → 假千金恶毒揭露 → 家人悔疯 → 安息或重生"
    emotion_arc: "极愤怒 → 窒息 → 心碎 → 爽 → 极爽 → 苍凉"
    target_words: [9000, 12000]
    chapter_count: [8, 10]
    signature_scenes:
      - "开场虐到极致:棺材窒息/被活埋/被当成演戏"
      - "灵魂视角看到所有人真面目"
      - "家人每次说'她在演戏'都是心理暴击"
      - "假千金'精致的恶':表面无辜暗地毒辣"
      - "家人后悔层层递进"
    target_platforms: ["点众短篇", "番茄短篇", "黑岩短篇"]
    hot_score: 3
    notes: "'死后才被爱'击穿读者防线;每个家人反应不同(暴力/犹豫/嘲讽)"

  - id: chong_sheng_li_hun_ni_xi
    name: "重生离婚逆袭"
    formula: "前世被害 → 重生 → 冷静签字 → 拿走应得 → 投资前世已知项目 → 前夫后悔 → 拒绝挽回"
    emotion_arc: "憋屈 → 释然 → 爽 → 更爽 → 极爽 → 满足"
    target_words: [9000, 12000]
    chapter_count: [8, 10]
    signature_scenes:
      - "前世死法和前夫直接相关(他在隔壁挑请帖)"
      - "重生后第一反应不是哭闹而是'笑了'"
      - "离婚干脆要钱要利不要人"
      - "投资展示主角智慧"
      - "前夫后悔递进"
    target_platforms: ["番茄短篇", "七猫短篇"]
    hot_score: 3
    notes: "重生文核心:做'前世绝不会做的事';前夫不是纯坏而是'理所当然地忽视'"

  - id: zhui_fu_huo_zang_chang
    name: "追夫火葬场不原谅型"
    formula: "发现真相 → 彻底死心 → 妻子失控但不为男主 → 决然离开 → 妻子身败名裂 → 重逢已新欢 → 不原谅"
    emotion_arc: "绝望 → 平静 → 新生 → 痛快 → 苍凉"
    target_words: [9000, 12000]
    chapter_count: [8, 10]
    signature_scenes:
      - "引诱失败清单:用'第 N 次'制造递进绝望"
      - "撞见真相:亲眼看到她的另一面"
      - "妻子的'无所谓'(以为他会回来)"
      - "新恋人的对比:温柔 vs 从不在意"
      - "天台对峙 BE 结局"
    target_platforms: ["番茄短篇", "黑岩短篇"]
    hot_score: 2
    notes: "男主越冷静越有力;'不是所有道歉都值得原谅'"

  - id: nian_dai_yi_shu_fu_chou
    name: "年代医术复仇"
    formula: "前世极惨(被卖→工具→被赶→烧死) → 重生 → 银针金手指 → 步步为营 → 收网 → BE 圆满"
    emotion_arc: "愤怒 → 爽 → 紧张 → 极爽 → 苍凉(男主病逝)"
    target_words: [10000, 14000]
    chapter_count: [8, 11]
    signature_scenes:
      - "前世极惨:被 500 块卖→生育工具→被赶→烧死"
      - "重生后冷静面对不再害怕"
      - "医术金手指:银针/穴位/诊断"
      - "贵人沈夫人结识"
      - "丈夫双重身份(也在复仇)"
      - "复仇成功但男主病逝 BE"
    target_platforms: ["七猫短篇", "番茄短篇"]
    hot_score: 2
    notes: "年代感靠细节(500 块/银针/公鸡拜堂);BE 是'得到一切但失去最重要的人'"

  - id: ling_hun_jia_ting_nve
    name: "灵魂视角家庭虐文"
    formula: "病中被虐 → 灵魂飘起 → 旁观真相 → 证据浮出 → 审判清算 → 重生暖心收尾"
    emotion_arc: "窒息 → 心碎 → 释放 → 痛快 → 治愈"
    target_words: [8000, 11000]
    chapter_count: [5, 8]
    signature_scenes:
      - "病中被逼:脊椎手术后被祭祖/剖腹产被做饭"
      - "灵魂飘起的转折:'我的魂魄慢慢飘起来'"
      - "配角拱火(堂妹/嫂子)"
      - "母亲的'面子'执念比纯粹的恶更虐"
      - "手机/日记成为审判证据"
      - "重生新妈妈'紧不紧?会不会不舒服?'对比前世'给我站直了!'"
    target_platforms: ["番茄短篇", "黑岩短篇", "点众短篇"]
    hot_score: 3
    notes: "'我想要的只是一句疼不疼';最后一句必须温暖给读者出口"

  - id: xi_jie_xian_suo_fu_chou
    name: "细节线索驱动型复仇"
    formula: "发现异常细节 → 暗中调查 → 布局反击 → 公开对峙 → 连环反杀"
    emotion_arc: "警觉 → 压抑 → 冷静 → 爽 → 极爽 → 豁达"
    target_words: [8000, 11000]
    chapter_count: [8, 13]
    signature_scenes:
      - "触发细节:钥匙扣/避孕套品牌/香水味"
      - "职业优势:法务总监/医生/银行高管"
      - "证据链:转账+监控+消费+证人"
      - "'笑着点头'时刻"
      - "反向利用对方的棋子"
      - "'人情味很贵'收尾"
    target_platforms: ["番茄短篇", "知乎盐言"]
    hot_score: 2
    notes: "超短章节制(500-1000 字/章);用'冷描写'写大情绪('我指甲掐进掌心')"

  - id: fan_tao_lu_jia_huo_chong_sheng
    name: "反套路嫁祸型重生"
    formula: "重生假意顺从 → '你既然想要,就都给你吧' → 暗中布局 → 身份揭露 → 看对方自毁 → 离开"
    emotion_arc: "了然 → 爽 → 更爽 → 极爽 → 痛快 → 豁达"
    target_words: [8000, 11000]
    chapter_count: [6, 8]
    signature_scenes:
      - "'给你吧'时刻:遗产是毒药"
      - "白月光三连试探:撒娇→哭闹→威胁"
      - "渣男'既要又要'两头落空"
      - "权威人物到场一句话改写全局"
      - "冷眼旁观对方自毁"
      - "'头也不回'式离开"
    target_platforms: ["番茄短篇", "七猫短篇"]
    hot_score: 2
    notes: "核心技法:'给你就是最好的惩罚';最大的蔑视是漠视"

  - id: gong_kai_shen_pan_da_lian
    name: "公开审判式打脸"
    formula: "竞技场设定 → 反派先赢 → 主角标志性冷静 → 逐层揭露 → 反派逐级崩溃 → 标志性驱逐台词 → 背影离场"
    emotion_arc: "压抑 → 期待 → 爆发 → 碾压 → 豁达"
    target_words: [8000, 11000]
    chapter_count: [6, 9]
    signature_scenes:
      - "公开场:股东会/家族寿宴/公司大堂/医院走廊"
      - "标志性动作:端起水杯喝一口/理西装/转车钥匙"
      - "逐层甩证据,反派从得意到崩溃"
      - "驱逐台词:'与狗,不得入内'"
      - "全场死寂中头也不回离开"
    target_platforms: ["番茄短篇", "黑岩短篇"]
    hot_score: 3
    notes: "'厚重的隔音门彻底关上,将两个世界永远地隔绝'电影感收场"

  - id: yin_ren_fu_hei
    name: "宫闱宅斗隐忍腹黑型"
    formula: "主动入局 → 以退为进 → 借力打力 → 静待自毁 → 设局收网 → 终极反转(主角全程操纵)"
    emotion_arc: "好奇 → 爽 → 更爽 → 震撼"
