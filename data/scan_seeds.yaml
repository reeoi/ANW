    formula: "中年危机(离婚/失业) → 系统激活 → 新手礼包 → 隐藏装备 → 前妻后悔 → 父子修复"
    emotion_arc: "憋屈 → 爽(系统) → 更爽(变化) → 满足(关系修复)"
    target_words: [10000, 14000]
    chapter_count: [8, 12]
    signature_scenes:
      - "中年危机够惨:离婚/失业/被嫌弃"
      - "系统面板讽刺数据'报废边缘''魅力值5'"
